# ==============================
# Flash
# ==============================
#CONFIG_FLASH_SIZE=16384

#Thread analyzer
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_PRINTK=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_STACK_INFO=y

# ==============================
# Flash NVS and littlefs
# ==============================
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FLASH_SIZE=16384

# ==============================
# Networking and Wi-Fi
# ==============================
CONFIG_WIFI_ESP32=y
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_WIFI_LOG_LEVEL_ERR=y
CONFIG_EARLY_CONSOLE=y
CONFIG_NETWORKING=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_DHCPV4=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_LOG=y
CONFIG_NET_SHELL=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_PERIODIC_OUTPUT=n
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=n
CONFIG_POSIX_API=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y


# HTTP and DNS
CONFIG_HTTP_CLIENT=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=n # Start with plain HTTP
# ==============================
# Serial and Logging
# ==============================
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
#CONFIG_PRINTK=y

# ==============================
# Logging and debug
# ==============================
CONFIG_LOG=y

# REMOVED (causes stack overflow in BLE context)
#CONFIG_LOG_MODE_IMMEDIATE=y

# ADDED (safe logging mode)
CONFIG_LOG_MODE_DEFERRED=y

#CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BUFFER_SIZE=4096
#CONFIG_LOG_DEFAULT_LEVEL=4

# ==============================
# Shell
# ==============================
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="bstd:~$ "
CONFIG_SHELL_STACK_SIZE=4096

# ==============================
# Stack diagnostics
# ==============================
#CONFIG_STACK_SENTINEL=y

# ADDED (better stack debugging)
#CONFIG_INIT_STACKS=y
#CONFIG_STACK_USAGE=y

# ==============================
# BLE Config
# ==============================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="BSTD_DEV"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_HCI=y

#CONFIG_BT_HCI_HOST=y
#CONFIG_BT_CTLR=y

# ==============================
# BLE Logging (reduced to safe level)
# ==============================

# REMOVED (too heavy, causes deep stack usage)
#CONFIG_BT_LOG_LEVEL_DBG=y

# ADDED (safe level)
#CONFIG_BT_LOG_LEVEL_INF=y

# REMOVED (enable later one-by-one if needed)
#CONFIG_BT_HCI_CORE_LOG_LEVEL_DBG=y
#CONFIG_BT_L2CAP_LOG_LEVEL_DBG=y
#CONFIG_BT_ATT_LOG_LEVEL_DBG=y
#CONFIG_BT_GATT_LOG_LEVEL_DBG=y
#CONFIG_BT_CONN_LOG_LEVEL_DBG=y

# ==============================
# System Stability (recommended)
# ==============================

# ADDED (optional but improves stability)
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_ISR_STACK_SIZE=4096



# ==============================
# BSTD APP config
# ==============================
CONFIG_BSTD=y
CONFIG_NVS_MGR_ENABLE=y
CONFIG_BLE_ENABLE=y
CONFIG_COMMU_ENABLE=y
CONFIG_DEV_SETT=y
CONFIG_SENSOR=y
CONFIG_FEATURE_ENABLE=y
CONFIG_NETWORK_MOD=y
CONFIG_SHELL_MOD=y